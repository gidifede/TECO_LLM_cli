<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Interview Evaluator{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">Interview Evaluator</a>
  <div class="navbar-links">
    <a href="/" {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="/pipeline" {% if active_page == 'pipeline' %}class="active"{% endif %}>Pipeline</a>
    <a href="/steps/simulate" {% if active_page == 'steps' %}class="active"{% endif %}>Step Singolo</a>
    <a href="/scenarios" {% if active_page == 'scenarios' %}class="active"{% endif %}>Scenari</a>
    <a href="/comparisons" {% if active_page == 'comparisons' %}class="active"{% endif %}>Confronta</a>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
